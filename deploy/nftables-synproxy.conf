#!/usr/sbin/nft -f
# =============================================================================
# FiveM-Sentinel — nftables SYNPROXY (pairs with the XDP SYN-cookie offload)
#
# The XDP program answers incoming SYNs itself: it generates a kernel SYN-cookie
# and XDP_TX's the SYN-ACK at the driver layer, so a SYN flood never touches the
# stack. The cookie shares the kernel's secret, so SYNPROXY here can validate the
# completing ACK *statelessly* (it never saw the SYN) and splice the real
# connection to FXServer. This is the same model as the kernel's xdp_synproxy.
#
# Apply:  sudo nft -f deploy/nftables-synproxy.conf
# Requires: kernel CONFIG_NFT_SYNPROXY, nftables, and the sysctls at the bottom.
#
# Edit WAN and GAME_PORT to match your box. MSS MUST equal the value the XDP
# SYN-ACK advertises (sentinel --... uses 1460 by default). wscale/SACK/
# timestamps are intentionally omitted to stay consistent with the minimal
# MSS-only SYN-ACK the XDP path emits.
# =============================================================================

define WAN       = eth0
define GAME_PORT = 30120

table inet sentinel_synproxy {
	chain prerouting {
		type filter hook prerouting priority raw; policy accept;

		# Keep conntrack from creating state for bare SYNs to the game port —
		# the cookie is self-validating, so no per-SYN state is needed (this is
		# what makes it flood-proof).
		iifname $WAN tcp dport $GAME_PORT tcp flags syn / fin,syn,rst,ack notrack
	}

	chain input {
		type filter hook input priority filter; policy accept;

		# The ACK completing the handshake arrives untracked/invalid because the
		# SYN was handled by XDP. SYNPROXY validates the cookie and establishes
		# the connection. MSS must match the XDP SYN-ACK.
		iifname $WAN tcp dport $GAME_PORT ct state invalid,untracked \
			synproxy mss 1460

		# Spoofed or stale ACKs that still don't form a valid connection.
		iifname $WAN tcp dport $GAME_PORT ct state invalid drop
	}
}

# -----------------------------------------------------------------------------
# Required sysctls (put in /etc/sysctl.d/99-sentinel.conf and `sysctl --system`):
#
#   net.ipv4.tcp_syncookies = 2          # always use syncookies
#   net.netfilter.nf_conntrack_tcp_loose = 0   # mandatory for SYNPROXY
#
# If you are NOT using the XDP SYN-cookie offload (sentinel --no-syn-cookies),
# this SYNPROXY config still works on its own — the kernel will generate the
# SYN-ACK cookies instead of XDP. You then also want a SYN rule that actually
# triggers synproxy on the SYN:
#   iifname $WAN tcp dport $GAME_PORT tcp flags syn synproxy mss 1460
# -----------------------------------------------------------------------------
