# =============================================================================
# FiveM-Sentinel — nginx reverse proxy (Layer 7 protection)
#
# This is the layer that actually stops "players.json / info.json / dynamic.json
# spam takes the server offline". FXServer generates those responses on a hot
# path; without a cache, a few requests per second per attacker is enough to peg
# the main thread. nginx absorbs that with a short micro-cache plus per-IP rate
# limiting, so the FXServer process is hit at most once per cache window no
# matter how hard the endpoints are spammed.
#
# Topology:
#   players ──HTTPS:443──> nginx (cache + rate limit) ──> FXServer :30120 (http)
#   players ──UDP/TCP:30120 (game)──> nginx stream ─────> FXServer :30120
# Run the XDP filter (sentinel) on THIS proxy host's NIC so volumetric L3/L4
# floods are dropped before they reach nginx or FXServer.
#
# Drop the http{} and stream{} sections below into /etc/nginx/nginx.conf
# (or include them). Replace 100.64.1.2 with your FXServer's address and set
# your TLS cert paths and server_name.
# =============================================================================

http {
    # ---- Caches -------------------------------------------------------------
    # Micro-cache for the spammed JSON endpoints (tiny, short-lived).
    proxy_cache_path /var/cache/nginx/fivem_json levels=1:2
                     keys_zone=fivem_json:10m max_size=64m inactive=30s use_temp_path=off;
    # Long-lived cache for downloadable assets (/files/).
    proxy_cache_path /var/cache/nginx/fivem_files levels=1:2
                     keys_zone=fivem_files:48m max_size=20g inactive=2h use_temp_path=off;

    # ---- Per-IP rate / connection limits ------------------------------------
    limit_req_zone  $binary_remote_addr zone=json_rl:10m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=conn_lim:10m;

    upstream fxserver {
        server 100.64.1.2:30120;
        keepalive 32;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name server1.example.com;

        ssl_certificate     /etc/letsencrypt/live/server1.example.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/server1.example.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # Cap concurrent connections per source IP across the whole vhost.
        limit_conn conn_lim 32;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ---- The spammed endpoints: micro-cache + strict rate limit ----------
        # ~1 upstream request per 3s regardless of incoming volume; everything
        # else is served from cache (or 429'd if a single IP floods).
        location ~ ^/(players|dynamic|info)\.json$ {
            limit_req zone=json_rl burst=10 nodelay;
            limit_req_status 429;

            proxy_pass http://fxserver;
            proxy_cache fivem_json;
            proxy_cache_valid 200 3s;
            proxy_cache_lock on;                 # collapse stampedes into 1 fetch
            proxy_cache_lock_timeout 5s;
            proxy_cache_use_stale updating error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_cache_background_update on;
            add_header X-Cache $upstream_cache_status always;
        }

        # ---- Resource downloads: cache aggressively -------------------------
        location /files/ {
            proxy_pass http://fxserver$request_uri;
            proxy_cache fivem_files;
            proxy_cache_valid 200 1y;
            proxy_cache_revalidate on;
            add_header X-Cache $upstream_cache_status always;
        }

        # ---- Everything else (connect handshake, etc.) ----------------------
        location / {
            proxy_pass http://fxserver;
        }
    }
}

# Raw game traffic passthrough (CitizenFX/ENet over UDP, plus TCP). nginx's
# stream module does no L7 here — the XDP filter in front handles volumetric
# abuse on this port.
stream {
    upstream fxserver_game {
        server 100.64.1.2:30120;
    }

    server {
        listen 30120;
        proxy_pass fxserver_game;
    }
    server {
        listen 30120 udp reuseport;
        proxy_pass fxserver_game;
        proxy_timeout 30s;
    }
}

# -----------------------------------------------------------------------------
# IMPORTANT: also firewall direct public access to FXServer's raw HTTP on
# tcp/30120 so attackers cannot bypass this cache by hitting the backend
# directly. Allow tcp/30120 only from the proxy host (and let the XDP filter +
# nft SYNPROXY guard whatever remains publicly reachable). Example:
#   nft add rule inet filter input tcp dport 30120 ip saddr != 100.64.1.1 \
#       ct state new drop
# -----------------------------------------------------------------------------
